<title>Robot-IK — Clientes</title>

<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; color-scheme: light; }
:root {
  --brand-blue: #0055A4; --brand-blue-dark: #003D7A; --brand-blue-light: #E8F0FB;
  --accent: #F4A623; --bg: #F0F2F7; --text-primary: #1A1E2E; --text-secondary: #5A6270;
  --sidebar-w: 240px; --topbar-h: 64px; --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
body { font-family: Sora, sans-serif; background: var(--bg); color: var(--text-primary); display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--brand-blue-dark); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; transition: transform .3s; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-logo img { width:100%; max-width:160px; height:auto; display:block; background:#fff; border-radius:8px; padding:8px; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: rgba(255,255,255,0.7); font-size: 0.875rem; cursor: pointer; transition: all .2s; text-decoration: none; border-left: 3px solid transparent; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: var(--accent); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-user { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-name { font-size: 0.8rem; font-weight: 600; color: #fff; }
.user-role { font-size: 0.7rem; color: rgba(255,255,255,0.55); }
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar { height: var(--topbar-h); background: #fff; border-bottom: 1px solid #E2E6EF; display: flex; align-items: center; gap: 16px; padding: 0 28px; position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; }
.topbar-icons { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.icon-btn { width: 36px; height: 36px; border-radius: 8px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: background .2s; }
.icon-btn:hover { background: var(--bg); }
.hamburger { display: none; }
.content { padding: 28px; flex: 1; }
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; font-family: Sora, sans-serif; cursor: pointer; border: none; transition: all .2s; white-space: nowrap; }
.btn-primary { background: var(--brand-blue); color: #fff; }
.btn-primary:hover { background: var(--brand-blue-dark); }
.btn-outline { background: #fff; color: var(--brand-blue); border: 1.5px solid var(--brand-blue); }
.btn-outline:hover { background: var(--brand-blue-light); }
.btn-ghost { background: none; color: var(--text-secondary); border: 1.5px solid #D8DCE8; }
.btn-ghost:hover { border-color: var(--brand-blue); color: var(--brand-blue); }
.btn-danger { background: #FFEBEE; color: #c62828; }
.btn-danger:hover { background: #FFCDD2; }
.btn-sm { padding: 7px 14px; font-size: 0.8rem; border-radius: 7px; }
.btn svg { width: 16px; height: 16px; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 20px; flex-wrap: wrap; }
.breadcrumb a { color: var(--brand-blue); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb svg { width: 14px; height: 14px; flex-shrink: 0; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid #F0F2F7; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 1; }
.modal-title { font-size: 1rem; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.modal-close:hover { background: var(--bg); }
.modal-body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid #F0F2F7; display: flex; justify-content: flex-end; gap: 10px; position: sticky; bottom: 0; background: #fff; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; }
.form-input, .form-select { height: 40px; border: 1.5px solid #D8DCE8; border-radius: 8px; padding: 0 12px; font-family: Sora, sans-serif; font-size: 0.85rem; color: var(--text-primary); background: #fff; outline: none; transition: border .2s; width: 100%; }
.form-input:focus, .form-select:focus { border-color: var(--brand-blue); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.marca-tag { display: inline-flex; padding: 3px 9px; border-radius: 10px; font-size: 0.68rem; font-weight: 700; flex-shrink: 0; }
.tag-fronius { background: #FBE9E7; color: #BF360C; }
.tag-binzel  { background: #E8F5E9; color: #1B5E20; }
.tag-yaskawa { background: #E3F2FD; color: #0D47A1; }
.tag-esab    { background: #FFF8E1; color: #F57F17; }
.tag-otro    { background: #F3E5F5; color: #4A148C; }
.loading-txt { text-align: center; padding: 48px; color: var(--text-secondary); font-size: 0.85rem; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
.overlay.show { display: block; }
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .hamburger { display: flex; }
  .content { padding: 16px; }
  .form-row { grid-template-columns: 1fr; }
}

.stats-strip { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card { background: #fff; border-radius: 10px; padding: 14px 20px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); flex: 1; min-width: 130px; }
.stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-n { font-size: 1.4rem; font-weight: 700; font-family: "JetBrains Mono", monospace; line-height: 1; }
.stat-l { font-size: 0.72rem; color: var(--text-secondary); margin-top: 2px; }
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
.search-box { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #D8DCE8; border-radius: 8px; padding: 0 12px; height: 38px; flex: 1; max-width: 360px; }
.search-box input { border: none; background: none; outline: none; font-family: Sora, sans-serif; font-size: 0.85rem; width: 100%; }
.clientes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 16px; }
.cliente-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: transform .2s, box-shadow .2s; }
.cliente-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.11); }
.cliente-card-header { padding: 18px 20px 12px; display: flex; align-items: flex-start; gap: 14px; }
.cli-avatar { width: 48px; height: 48px; border-radius: 12px; background: var(--brand-blue-light); display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: var(--brand-blue); flex-shrink: 0; }
.cli-nombre { font-size: 0.92rem; font-weight: 700; }
.cli-loc { font-size: 0.78rem; color: var(--text-secondary); margin-top: 3px; }
.cli-tel { font-size: 0.76rem; color: var(--text-secondary); margin-top: 2px; }
.badge-activo { display:inline-flex; padding:2px 9px; border-radius:12px; font-size:0.68rem; font-weight:700; background:#E8F5E9; color:#2E7D32; margin-top:6px; }
.cliente-card-footer { padding: 10px 20px; border-top: 1px solid #F0F2F7; display: flex; gap: 8px; }
</style>
</head>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cli">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-cli-titulo">Nuevo cliente</span>
      <button class="modal-close" onclick="cerrarModal('modal-cli')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="cli-nombre" placeholder="Razón social o nombre"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ciudad</label><input class="form-input" id="cli-ciudad" placeholder="Ej: Rosario"></div>
        <div class="form-group"><label class="form-label">Teléfono</label><input class="form-input" id="cli-tel" placeholder="+54 341..."></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="cli-mail" type="email" placeholder="contacto@empresa.com"></div>
      <div class="form-group" id="grupo-ajuste" style="display:none">
        <label class="form-label">Ajuste de precio (%)</label>
        <input class="form-input" id="cli-ajuste" type="number" step="0.5" placeholder="0" value="0">
        <span style="font-size:0.72rem;color:var(--text-secondary);margin-top:2px">Negativo = descuento (ej: -15). Positivo = recargo (ej: 10). 0 = precio de lista.</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-cli')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCliente()">Guardar</button>
    </div>
  </div>
</div>

<script>

const _SB_URL = "https://bnjmorxjibwvwzadzrdm.supabase.co";
const _SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuam1vcnhqaWJ3dnd6YWR6cmRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzU1MDEsImV4cCI6MjA5NjQ1MTUwMX0.sMNUpbVPKqJf0gDVS6LimaDDfMsYi-Im6kVnedFIfN4";
const sb = supabase.createClient(_SB_URL, _SB_KEY, { auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false } });

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function iniciales(nombre) {
  if (!nombre) return '?';
  return nombre.trim().split(/\s+/).slice(0,2).map(p=>p[0].toUpperCase()).join('');
}


function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  var ov = document.getElementById('overlay');
  if (ov) ov.classList.toggle('show');
}


let todos = [], editandoId = null;

function renderCards(lista) {
  const g = document.getElementById('clientes-grid');
  if (!lista.length) { g.innerHTML='<div class="loading-txt">No hay clientes.</div>'; return; }
  g.innerHTML = lista.map(c => `
    <div class="cliente-card">
      <div class="cliente-card-header">
        <div class="cli-avatar">${iniciales(c.nombre)}</div>
        <div style="min-width:0;flex:1">
          <div class="cli-nombre">${c.nombre||'—'}</div>
          ${c.ciudad ? `<div class="cli-loc">${c.ciudad}</div>` : ''}
          ${c.telefono ? `<div class="cli-tel">${c.telefono}</div>` : ''}
          <span class="badge-activo">● Activo</span>
        </div>
      </div>
      <div class="cliente-card-footer">
        <button class="btn btn-outline btn-sm" style="flex:1;justify-content:center"
          onclick="window.location.href='p03_ficha_cliente.html?id=${c.id}'">
          Ver ficha
        </button>
        <button class="btn btn-ghost btn-sm" onclick="editarCliente('${c.id}')">Editar</button>
      </div>
    </div>`).join('');
}

async function cargar() {
  const { data, error } = await sb.from('clientes').select('*').order('nombre');
  if (error) { document.getElementById('clientes-grid').innerHTML='<div class="loading-txt" style="color:#e53935">Error: '+error.message+'</div>'; return; }
  todos = data || [];
  document.getElementById('stat-total').textContent   = todos.length;
  document.getElementById('stat-activos').textContent = todos.filter(c=>c.activo!==false).length;
  filtrar();
}

function filtrar() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  renderCards(!q ? todos : todos.filter(c=>(c.nombre||'').toLowerCase().includes(q)||(c.ciudad||'').toLowerCase().includes(q)));
}

function abrirModalCliente(c) {
  editandoId = c ? c.id : null;
  document.getElementById('modal-cli-titulo').textContent = c ? 'Editar cliente' : 'Nuevo cliente';
  document.getElementById('cli-nombre').value = c?.nombre || '';
  document.getElementById('cli-ciudad').value = c?.ciudad || '';
  document.getElementById('cli-tel').value    = c?.telefono || '';
  document.getElementById('cli-mail').value   = c?.mail || '';
  document.getElementById('cli-ajuste').value = (c && c.ajuste_precio != null) ? c.ajuste_precio : 0;
  // Mostrar ajuste solo a Administración
  var _u = JSON.parse(sessionStorage.getItem('rik_user')||'{}');
  document.getElementById('grupo-ajuste').style.display = _u.rol_admin ? 'flex' : 'none';
  document.getElementById('modal-cli').classList.add('open');
}

function editarCliente(id) { abrirModalCliente(todos.find(x=>x.id===id)); }

async function guardarCliente() {
  const nombre = document.getElementById('cli-nombre').value.trim();
  if (!nombre) { alert('El nombre es obligatorio.'); return; }
  const payload = {
    nombre,
    ciudad:   document.getElementById('cli-ciudad').value.trim() || null,
    telefono: document.getElementById('cli-tel').value.trim()    || null,
    mail:     document.getElementById('cli-mail').value.trim()   || null,
    ajuste_precio: parseFloat(document.getElementById('cli-ajuste').value) || 0,
    activo:   true
  };
  const { error } = editandoId
    ? await sb.from('clientes').update(payload).eq('id', editandoId)
    : await sb.from('clientes').insert(payload);
  if (error) { alert('Error: '+error.message); return; }
  cerrarModal('modal-cli');
  cargar();
}

function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }
document.getElementById('modal-cli').addEventListener('click', e=>{ if(e.target===document.getElementById('modal-cli')) cerrarModal('modal-cli'); });
document.getElementById('topbar-title').textContent = 'Clientes';
cargar();

function cerrarSesion(){
  sessionStorage.removeItem('rik_user');
  try { localStorage.clear(); } catch(e){}
  window.location.replace('p01_login.html');
}
function _pintarUsuario(){
  try {
    var u = JSON.parse(sessionStorage.getItem('rik_user')||'{}');
    if(u.nombre){
      var ini = u.nombre.trim().split(/\s+/).slice(0,2).map(function(p){return p[0].toUpperCase();}).join('');
      var avEl = document.getElementById('sb-iniciales'); if(avEl) avEl.textContent = ini;
      var nmEl = document.getElementById('sb-nombre'); if(nmEl) nmEl.textContent = u.nombre;
      var rlEl = document.getElementById('sb-rol');
      if(rlEl){
        var roles = [];
        if(u.rol_admin) roles.push('Administración');
        if(u.rol_tecnico) roles.push('Técnico');
        rlEl.textContent = roles.join(' · ') || 'Sin rol';
      }
    }
  } catch(e){}
}
_pintarUsuario();
</script>
